<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>极简记账本</title>

  <!-- 图表库（必须有） -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 15px;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .income { color: green; }
    .expense { color: red; }
  </style>
</head>

<body>

<h2>💰 极简记账本</h2>

<div class="card">
  <label>类型</label>
  <select id="type">
    <option value="income">收入</option>
    <option value="expense">支出</option>
  </select>

  <label>金额</label>
  <input id="amount" type="number" placeholder="请输入金额"/>

  <label>备注</label>
  <input id="note" type="text" placeholder="例如：吃饭 / 工资"/>

  <button onclick="addRecord()">添加记录</button>
</div>

<div class="card">
  <h3>📊 统计</h3>
  <p>收入：<span id="income">0</span></p>
  <p>支出：<span id="expense">0</span></p>
  <p>余额：<span id="balance">0</span></p>
</div>

<!-- 图表区域 -->
<div class="card">
  <h3>📈 月度收支图</h3>
  <canvas id="myChart"></canvas>
</div>

<div class="card">
  <h3>📒 记录</h3>
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("moneyData") || "[]");

function save() {
  localStorage.setItem("moneyData", JSON.stringify(data));
}

function addRecord() {
  let type = document.getElementById("type").value;
  let amount = Number(document.getElementById("amount").value);
  let note = document.getElementById("note").value;

  if (!amount) return alert("请输入金额");

  data.push({
    type,
    amount,
    note,
    time: new Date().toLocaleString()
  });

  save();
  render();
}

function getMonthlyData() {
  let map = {};

  data.forEach(item => {
    let date = new Date(item.time);
    let month = `${date.getFullYear()}-${date.getMonth() + 1}`;

    if (!map[month]) {
      map[month] = { income: 0, expense: 0 };
    }

    if (item.type === "income") {
      map[month].income += item.amount;
    } else {
      map[month].expense += item.amount;
    }
  });

  return map;
}

let chartInstance = null;

function renderChart() {
  let monthly = getMonthlyData();

  let labels = Object.keys(monthly).sort();
  let incomeData = labels.map(m => monthly[m].income);
  let expenseData = labels.map(m => monthly[m].expense);

  const ctx = document.getElementById('myChart');

  if (!ctx) return;

  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '收入',
          data: incomeData,
          backgroundColor: 'green'
        },
        {
          label: '支出',
          data: expenseData,
          backgroundColor: 'red'
        }
      ]
    }
  });
}

function render() {
  let income = 0, expense = 0;
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    if (item.type === "income") income += item.amount;
    else expense += item.amount;

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.note}</span>
      <span class="${item.type}">
        ${item.type === "income" ? "+" : "-"}${item.amount}
      </span>
    `;

    list.appendChild(div);
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("balance").innerText = income - expense;

  renderChart();
}

render();
</script>

</body>
</html>
