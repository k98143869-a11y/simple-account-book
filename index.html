<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>理财App Pro</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4caf50">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 15px;
      max-width: 420px;
      margin: auto;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }

    .income { color: green; }
    .expense { color: red; }
  </style>
</head>

<body>

<h2>💰 理财App Pro</h2>

<div class="card">
  <select id="type">
    <option value="income">收入</option>
    <option value="expense">支出</option>
  </select>

  <select id="category">
    <option>餐饮</option>
    <option>交通</option>
    <option>购物</option>
    <option>住房</option>
    <option>工资</option>
    <option>其他</option>
  </select>

  <input id="amount" type="number" placeholder="金额"/>
  <input id="note" placeholder="备注"/>

  <button onclick="add()">添加记录</button>
</div>

<div class="card">
  <p>收入：<span id="income">0</span></p>
  <p>支出：<span id="expense">0</span></p>
  <p>余额：<span id="balance">0</span></p>
</div>

<div class="card">
  <h3>📊 月度趋势</h3>
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <h3>🍰 支出结构</h3>
  <canvas id="pieChart"></canvas>
</div>

<div class="card">
  <h3>🧠 AI分析</h3>
  <button onclick="analyze()">生成分析</button>
  <p id="ai"></p>
</div>

<div class="card">
  <h3>📒 记录</h3>
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function add(){
  data.push({
    id: Date.now(),
    type: type.value,
    category: category.value,
    amount: Number(amount.value),
    note: note.value,
    time: new Date().toLocaleString()
  });

  save();
  render();
}

function render(){
  let income=0, expense=0;
  list.innerHTML="";

  data.forEach(i=>{
    if(i.type==="income") income+=i.amount;
    else expense+=i.amount;

    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<span>${i.category}-${i.note}</span>
    <span class="${i.type}">
      ${i.type==="income"?"+":"-"}${i.amount}
    </span>`;
    list.appendChild(div);
  });

  incomeEl.innerText=income;
  expenseEl.innerText=expense;
  balance.innerText=income-expense;

  renderBar();
  renderPie();
}

function renderBar(){
  let map={};

  data.forEach(i=>{
    let d=new Date(i.time);
    let k=`${d.getFullYear()}-${d.getMonth()+1}`;

    if(!map[k]) map[k]={income:0,expense:0};

    if(i.type==="income") map[k].income+=i.amount;
    else map[k].expense+=i.amount;
  });

  let labels=Object.keys(map);

  new Chart(barChart, {
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"收入",data:labels.map(k=>map[k].income),backgroundColor:"green"},
        {label:"支出",data:labels.map(k=>map[k].expense),backgroundColor:"red"}
      ]
    }
  });
}

function renderPie(){
  let map={};

  data.forEach(i=>{
    if(i.type==="expense"){
      map[i.category]=(map[i.category]||0)+i.amount;
    }
  });

  new Chart(pieChart,{
    type:"pie",
    data:{
      labels:Object.keys(map),
      datasets:[{data:Object.values(map)}]
    }
  });
}

function analyze(){
  let income=0,expense=0,map={};

  data.forEach(i=>{
    if(i.type==="income") income+=i.amount;
    else {
      expense+=i.amount;
      map[i.category]=(map[i.category]||0)+i.amount;
    }
  });

  let top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  let rate=income?((income-expense)/income*100).toFixed(1):0;

  ai.innerHTML=`
  💰 收入:${income}<br>
  💸 支出:${expense}<br>
  📊 储蓄率:${rate}%<br>
  🔥 最大支出:${top?top[0]:"无"}<br>
  ${rate<0?"⚠️ 超支警告":"✅ 财务健康"}
  `;
}

render();

// PWA注册
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>

</body>
</html>
